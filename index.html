<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#1a1a2e;--paper:#faf8f3;--cream:#f2ede3;--accent:#c0392b;
  --gold:#c9860a;--green:#1e8449;--muted:#7a7068;--border:#ddd6c8;
  --shadow:0 4px 20px rgba(0,0,0,.12);--r:16px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden}
body{background:var(--paper);font-family:'Noto Sans KR',sans-serif;color:var(--ink);display:flex;flex-direction:column;}
#app{display:flex;flex-direction:column;height:100%;overflow:hidden}
.header{background:var(--ink);color:white;padding:max(env(safe-area-inset-top,14px),14px) 20px 14px;flex-shrink:0;}
.header-inner{position:relative;display:flex;align-items:center;justify-content:center}
.header-title{font-family:'Playfair Display',serif;font-size:22px;letter-spacing:.3px}
.header-sub{font-size:11px;color:#9a9aaa;margin-top:2px;text-align:center}
.header-gear{position:absolute;right:0;background:rgba(255,255,255,.1);border:none;color:#9a9aaa;font-size:18px;cursor:pointer;padding:6px 8px;border-radius:8px;line-height:1}
.sync-status{font-size:10px;text-align:center;padding:3px 0;background:var(--ink);color:#666;flex-shrink:0}
.sync-status.ok{color:#1e8449}
.sync-status.err{color:#c0392b}
.sync-status.ing{color:#c9860a}
.tab-bar{display:flex;background:var(--ink);border-bottom:3px solid var(--accent);flex-shrink:0}
.tab-btn{flex:1;border:none;background:none;color:#9a9aaa;padding:11px 4px;font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:2px}
.tab-btn .ico{font-size:18px}
.tab-btn.active{color:white;background:rgba(192,57,43,.2);font-weight:600}
.tab-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tab-page{display:none;padding:16px}
.tab-page.active{display:block}
.btn{border:none;border-radius:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:600;transition:opacity .2s,transform .1s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:white;padding:13px 20px;font-size:14px}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-gold{background:var(--gold);color:white;padding:8px 14px;font-size:13px;border-radius:10px}
.btn-outline{background:transparent;border:2px solid var(--ink);color:var(--ink);padding:12px 20px;font-size:14px}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-full{width:100%}
.search-row{display:flex;gap:8px;margin-bottom:16px}
.search-input{flex:1;border:2px solid var(--border);border-radius:14px;padding:13px 16px;font-size:15px;font-family:'Noto Sans KR',sans-serif;background:white;outline:none;transition:border .2s;color:var(--ink)}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:#bbb}
.result-card{background:white;border-radius:var(--r);box-shadow:var(--shadow);padding:20px;display:flex;flex-direction:column;gap:14px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.idiom-big{font-family:'Playfair Display',serif;font-size:22px;line-height:1.3;color:var(--ink)}
.badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.5px}
.badge-en{background:#e8f0fe;color:#1a56db}
.badge-ko{background:#fce8e6;color:var(--accent)}
.meaning-block{display:flex;flex-direction:column;gap:8px}
.meaning-row{display:flex;align-items:flex-start;gap:10px}
.meaning-flag{font-size:16px;line-height:1.4;flex-shrink:0}
.meaning-text{font-size:14px;line-height:1.5}
.meaning-text.ko{font-weight:600;color:var(--accent)}
.example-block{background:var(--cream);border-left:3px solid var(--gold);border-radius:10px;padding:12px 14px}
.block-label{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.8px;margin-bottom:4px}
.example-text{font-style:italic;font-size:13px;color:#444;line-height:1.6}
.tip-block{background:#eafaf1;border-left:3px solid var(--green);border-radius:10px;padding:12px 14px}
.tip-block .block-label{color:var(--green)}
.tip-text{font-size:13px;color:#1a5c36;line-height:1.5}
.msg-ok{color:var(--green);font-size:13px;font-weight:600;text-align:center}
.msg-warn{color:var(--gold);font-size:13px;font-weight:600;text-align:center}
.loader-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:50px 20px;color:var(--muted)}
.spinner{width:40px;height:40px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--accent);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:10px}
.empty-ico{font-size:48px}
.empty-text{font-size:15px;line-height:1.8}
.vocab-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.vocab-count{font-size:12px;color:var(--muted)}
.vocab-list{display:flex;flex-direction:column;gap:10px}
.vocab-item{background:white;border-radius:var(--r);box-shadow:0 2px 10px rgba(0,0,0,.07);overflow:hidden}
.vocab-header{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;-webkit-user-select:none;user-select:none}
.vocab-num{width:24px;height:24px;border-radius:50%;background:var(--cream);color:var(--muted);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.vocab-main{flex:1;min-width:0}
.vocab-idiom{font-family:'Playfair Display',serif;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vocab-preview{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vocab-chevron{color:var(--muted);font-size:12px;flex-shrink:0;transition:transform .2s}
.vocab-item.open .vocab-chevron{transform:rotate(180deg)}
.vocab-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:16px;padding:4px 8px;border-radius:8px;transition:all .2s;flex-shrink:0}
.vocab-del:active{color:var(--accent);background:#feeced}
.vocab-body{display:none;padding:0 16px 14px;border-top:1px solid var(--border);padding-top:12px;flex-direction:column;gap:10px}
.vocab-item.open .vocab-body{display:flex}
.game-idle{display:flex;flex-direction:column;align-items:center;gap:16px;padding:40px 16px;text-align:center}
.game-hero-ico{font-size:70px;animation:bounce 2s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.game-hero-title{font-family:'Playfair Display',serif;font-size:28px}
.game-hint{color:var(--muted);font-size:13px;line-height:1.8}
.game-modes{display:flex;flex-direction:column;gap:10px;width:100%}
.game-mode-btn{display:flex;align-items:center;gap:14px;background:white;border:2px solid var(--border);border-radius:var(--r);padding:16px 18px;cursor:pointer;text-align:left;transition:border .2s;font-family:'Noto Sans KR',sans-serif;width:100%}
.game-mode-btn:active{border-color:var(--accent)}
.mode-ico{font-size:28px}
.mode-name{font-size:14px;font-weight:700;color:var(--ink)}
.mode-desc{font-size:12px;color:var(--muted);margin-top:2px}
.q-progress-wrap{margin-bottom:12px}
.q-progress-bg{background:var(--border);border-radius:4px;height:5px;overflow:hidden}
.q-progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .4s ease}
.q-meta{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);margin-top:6px}
.q-score-live{font-weight:700;color:var(--ink)}
.q-card{background:var(--ink);color:white;border-radius:var(--r);padding:30px 22px;text-align:center;margin-bottom:20px;box-shadow:var(--shadow)}
.q-idiom-text{font-family:'Playfair Display',serif;font-size:26px;margin-bottom:8px;line-height:1.3}
.q-ask{font-size:12px;color:#9a9aaa}
.choices{display:flex;flex-direction:column;gap:10px}
.choice-btn{display:flex;align-items:center;gap:12px;background:white;border:2px solid var(--border);border-radius:14px;padding:13px 16px;font-size:14px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;text-align:left;transition:border .2s,background .2s;width:100%}
.choice-btn:disabled{cursor:default}
.choice-btn.correct{border-color:var(--green);background:#eafaf1}
.choice-btn.wrong{border-color:var(--accent);background:#feeced}
.choice-letter{width:28px;height:28px;border-radius:8px;background:var(--cream);color:var(--muted);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.choice-btn.correct .choice-letter{background:var(--green);color:white}
.choice-btn.wrong .choice-letter{background:var(--accent);color:white}
.next-wrap{margin-top:14px}
.done-screen{display:flex;flex-direction:column;align-items:center;gap:16px;padding:20px 0}
.score-ring{width:120px;height:120px;border-radius:50%;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(0,0,0,.2);margin:10px 0}
.score-big{font-family:'Playfair Display',serif;font-size:44px;color:white;line-height:1}
.score-of{font-size:13px;color:#9a9aaa}
.score-grade{font-size:20px;font-weight:700}
.review-list{width:100%;display:flex;flex-direction:column;gap:8px}
.review-row{display:flex;align-items:center;gap:10px;background:white;border-radius:12px;padding:11px 14px;font-size:13px}
.review-row.ok{border-left:3px solid var(--green)}
.review-row.fail{border-left:3px solid var(--accent)}
.review-idiom{flex:1;font-family:'Playfair Display',serif}
.review-ans{font-size:11px;color:var(--green)}
.divider{height:1px;background:var(--border);margin:4px 0}
.bottom-pad{height:calc(20px + var(--safe-bottom))}
</style>
</head>
<body>
<div id="app">
  <header class="header">
    <div class="header-inner">
      <div>
        <div class="header-title">📖 Idiom Master</div>
        <div class="header-sub">영어 숙어 검색 · 숙어장 · 퀴즈</div>
      </div>
      <button class="header-gear" onclick="showSettingsModal()">⚙️</button>
    </div>
  </header>
  <div class="sync-status" id="syncStatus">☁️ GitHub 연동 중...</div>
  <nav class="tab-bar">
    <button class="tab-btn active" onclick="switchTab(0)" id="tab0"><span class="ico">🔍</span>검색</button>
    <button class="tab-btn" onclick="switchTab(1)" id="tab1"><span class="ico">📚</span>숙어장</button>
    <button class="tab-btn" onclick="switchTab(2)" id="tab2"><span class="ico">🎮</span>게임</button>
  </nav>
  <div class="tab-scroll">
    <div class="tab-page active" id="page0">
      <div class="search-row">
        <input class="search-input" id="searchInput" type="text" placeholder="영어 숙어 입력 (예: break a leg)" autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter')doSearch()"/>
        <button class="btn btn-primary" onclick="doSearch()" id="searchBtn">검색</button>
      </div>
      <div id="searchResult"></div>
    </div>
    <div class="tab-page" id="page1">
      <div class="vocab-meta">
        <span class="vocab-count" id="vocabCount">0개 저장됨</span>
        <div style="display:flex;gap:6px">
          <button class="btn btn-outline btn-sm" onclick="loadFromGitHubManual()">📥 불러오기</button>
          <button class="btn btn-outline btn-sm" onclick="syncToGitHub(true)">☁️ 동기화</button>
        </div>
      </div>
      <div class="vocab-list" id="vocabList"></div>
      <div class="bottom-pad"></div>
    </div>
    <div class="tab-page" id="page2">
      <div id="gameArea"></div>
      <div class="bottom-pad"></div>
    </div>
  </div>
</div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const GH_OWNER = 'RockyMarciano-1';
const GH_REPO  = 'idiom-master';
const GH_FILE  = 'vocab.json';
const GH_BRANCH= 'main';

// ── Local Keys ─────────────────────────────────────────────────────────────
const LS_API   = 'idiom-api-key';
const LS_GH    = 'idiom-gh-token';
const LS_VOCAB = 'idiom-vocab-cache';

let apiKey  = localStorage.getItem(LS_API)  || '';
let ghToken = localStorage.getItem(LS_GH) || '';
let vocab   = [];
let ghFileSha = null; // 현재 파일의 SHA (업데이트 시 필요)

// ── Sync Status UI ─────────────────────────────────────────────────────────
function setSyncStatus(type, msg){
  const el = document.getElementById('syncStatus');
  el.className = 'sync-status ' + type;
  el.textContent = msg;
}

// ── GitHub API ─────────────────────────────────────────────────────────────
function ghHeaders(){
  return {
    'Authorization': 'token ' + ghToken,
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json'
  };
}

async function loadFromGitHub(){
  if(!ghToken){ loadFromLocal(); return; }
  setSyncStatus('ing', '☁️ GitHub에서 불러오는 중...');
  try {
    const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}?ref=${GH_BRANCH}`, {
      headers: ghHeaders()
    });
    if(res.status === 404){
      // 파일 없음 → 로컬 캐시 사용
      loadFromLocal();
      setSyncStatus('ok', '✅ GitHub 연동됨 (새 숙어장)');
      return;
    }
    if(!res.ok) throw new Error('GitHub 오류 ' + res.status);
    const data = await res.json();
    ghFileSha = data.sha;
    const decoded = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\n/g,'')))));
    vocab = Array.isArray(decoded) ? decoded : [];
    localStorage.setItem(LS_VOCAB, JSON.stringify(vocab));
    renderVocab();
    setSyncStatus('ok', '✅ GitHub에서 불러옴 · ' + vocab.length + '개');
  } catch(e){
    loadFromLocal();
    setSyncStatus('err', '⚠️ GitHub 연결 실패 · 로컬 캐시 사용 중');
  }
}

async function loadFromGitHubManual(){
  if(!ghToken){ alert("⚙️ 설정에서 GitHub 토큰을 먼저 입력해주세요."); return; }
  if(!confirm("GitHub에서 숙어장을 불러올까요?\n현재 기기의 숙어장은 GitHub 데이터로 교체됩니다.")) return;
  setSyncStatus("ing", "☁️ GitHub에서 불러오는 중...");
  try {
    const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}?ref=${GH_BRANCH}`, { headers: ghHeaders() });
    if(res.status===404){ alert("GitHub에 저장된 숙어장이 없습니다."); setSyncStatus("err","⚠️ GitHub에 저장된 데이터 없음"); return; }
    if(!res.ok) throw new Error("GitHub 오류 " + res.status);
    const data = await res.json();
    ghFileSha = data.sha;
    const decoded = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\n/g,"")))));
    vocab = Array.isArray(decoded) ? decoded : [];
    localStorage.setItem(LS_VOCAB, JSON.stringify(vocab));
    renderVocab();
    setSyncStatus("ok", "✅ GitHub에서 불러옴 · " + vocab.length + "개");
    alert("✅ " + vocab.length + "개 숙어를 GitHub에서 불러왔습니다!");
  } catch(e){
    setSyncStatus("err","⚠️ 불러오기 실패");
    alert("❌ 불러오기 실패: " + e.message);
  }
}

function loadFromLocal(){
  try { vocab = JSON.parse(localStorage.getItem(LS_VOCAB)) || []; } catch(e){ vocab=[]; }
  renderVocab();
}

async function syncToGitHub(manual=false){
  if(!ghToken){
    if(manual) alert('GitHub 토큰이 설정되지 않았습니다. ⚙️ 설정에서 입력해주세요.');
    return;
  }
  setSyncStatus('ing', '☁️ GitHub에 저장 중...');
  try {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(vocab, null, 2))));
    const body = {
      message: `숙어장 업데이트 (${vocab.length}개)`,
      content,
      branch: GH_BRANCH
    };
    if(ghFileSha) body.sha = ghFileSha;
    const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`, {
      method: 'PUT',
      headers: ghHeaders(),
      body: JSON.stringify(body)
    });
    if(!res.ok){
      const err = await res.json();
      // SHA 충돌 시 최신 SHA 가져와서 재시도
      if(res.status===409 || (err.message&&err.message.includes('sha'))){
        await refreshSha();
        return syncToGitHub(manual);
      }
      throw new Error(err.message || 'GitHub 저장 실패');
    }
    const result = await res.json();
    ghFileSha = result.content.sha;
    localStorage.setItem(LS_VOCAB, JSON.stringify(vocab));
    setSyncStatus('ok', '✅ GitHub 저장 완료 · ' + vocab.length + '개');
    if(manual) alert('✅ GitHub에 저장되었습니다!');
  } catch(e){
    setSyncStatus('err', '⚠️ GitHub 저장 실패 · 로컬에만 저장됨');
    localStorage.setItem(LS_VOCAB, JSON.stringify(vocab));
    if(manual) alert('⚠️ GitHub 저장 실패: ' + e.message);
  }
}

async function refreshSha(){
  try {
    const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}?ref=${GH_BRANCH}`, { headers: ghHeaders() });
    if(res.ok){ const d = await res.json(); ghFileSha = d.sha; }
  } catch(e){}
}

// ── Vocab CRUD ─────────────────────────────────────────────────────────────
function addVocab(entry){
  if(vocab.find(x=>x.idiom.toLowerCase()===entry.idiom.toLowerCase())) return false;
  vocab.unshift(entry);
  renderVocab();
  syncToGitHub();
  return true;
}

function removeVocab(idiom){
  vocab = vocab.filter(x=>x.idiom!==idiom);
  renderVocab();
  syncToGitHub();
}

// ── Tabs ───────────────────────────────────────────────────────────────────
function switchTab(n){
  document.querySelectorAll('.tab-page').forEach((p,i)=>p.classList.toggle('active',i===n));
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===n));
  if(n===1) renderVocab();
  if(n===2) renderGameIdle();
}

// ── Settings Modal ─────────────────────────────────────────────────────────
function showSettingsModal(){
  if(document.getElementById('settingsModal')) return;
  const overlay = document.createElement('div');
  overlay.id = 'settingsModal';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:9999;padding:24px;backdrop-filter:blur(4px)';
  overlay.innerHTML = `
    <div style="background:white;border-radius:20px;padding:28px 24px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto">
      <div style="font-size:32px;text-align:center;margin-bottom:8px">⚙️</div>
      <h2 style="font-family:'Playfair Display',serif;font-size:20px;text-align:center;color:#1a1a2e;margin-bottom:20px">설정</h2>

      <div style="margin-bottom:16px">
        <div style="font-size:12px;font-weight:700;color:#7a7068;margin-bottom:6px">🔑 Anthropic API 키</div>
        <input id="s_apiKey" type="password" placeholder="sk-ant-..." value="${apiKey}"
          style="width:100%;border:2px solid #ddd6c8;border-radius:12px;padding:12px 14px;font-size:13px;font-family:monospace;outline:none;box-sizing:border-box"/>
        <div style="font-size:11px;color:#aaa;margin-top:4px">숙어 검색·퀴즈에 사용. <a href="https://console.anthropic.com/api-keys" target="_blank" style="color:#c0392b">발급받기</a></div>
      </div>

      <div style="margin-bottom:20px">
        <div style="font-size:12px;font-weight:700;color:#7a7068;margin-bottom:6px">☁️ GitHub Token</div>
        <input id="s_ghToken" type="password" placeholder="ghp_..." value="${ghToken}"
          style="width:100%;border:2px solid #ddd6c8;border-radius:12px;padding:12px 14px;font-size:13px;font-family:monospace;outline:none;box-sizing:border-box"/>
        <div style="font-size:11px;color:#aaa;margin-top:4px">숙어장을 GitHub에 영구 저장. 브라우저 초기화해도 유지됩니다.</div>
      </div>

      <button onclick="saveSettings()" style="width:100%;background:#c0392b;color:white;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-bottom:8px">저장</button>
      <button onclick="document.getElementById('settingsModal').remove()" style="width:100%;background:#f2ede3;color:#7a7068;border:none;border-radius:12px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif">닫기</button>
    </div>`;
  document.body.appendChild(overlay);
}

function saveSettings(){
  const ak = document.getElementById('s_apiKey').value.trim();
  const gh = document.getElementById('s_ghToken').value.trim();
  if(ak){ apiKey = ak; localStorage.setItem(LS_API, ak); }
  if(gh){ ghToken = gh; localStorage.setItem(LS_GH, gh); }
  document.getElementById('settingsModal').remove();
  alert('✅ 설정이 저장되었습니다!');
}

// ── Claude API ─────────────────────────────────────────────────────────────
async function callClaude(userMsg, sys){
  if(!apiKey){
    showSettingsModal();
    throw new Error('API 키를 먼저 설정해주세요.');
  }
  const controller = new AbortController();
  const timeout = setTimeout(()=>controller.abort(), 30000);
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      signal: controller.signal,
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: sys || 'Return ONLY valid JSON, no markdown fences.',
        messages: [{role:'user', content:userMsg}]
      })
    });
    if(res.status===401){ apiKey=''; localStorage.removeItem(LS_API); throw new Error('API 키가 유효하지 않습니다.'); }
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const raw = (data.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim();
    return JSON.parse(raw);
  } finally {
    clearTimeout(timeout);
  }
}

// ── Search ─────────────────────────────────────────────────────────────────
let lastResult = null;

async function doSearch(){
  const q = document.getElementById('searchInput').value.trim();
  if(!q) return;
  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  document.getElementById('searchResult').innerHTML = `<div class="loader-wrap"><div class="spinner"></div><p>Claude가 분석 중…</p></div>`;
  try {
    const sys = `You are an English idiom expert. Return ONLY valid JSON with keys: idiom, meaning_en, meaning_ko, example, tip. No markdown fences, no extra text.`;
    const data = await callClaude(`Look up this English idiom: "${q}"`, sys);
    lastResult = data;
    renderSearchResult(data, '');
  } catch(e){
    document.getElementById('searchResult').innerHTML = `
      <div class="empty-state">
        <div class="empty-ico">❌</div>
        <div class="empty-text">검색에 실패했습니다.<br>⚙️ 버튼에서 API 키를 확인해주세요.</div>
        <div style="font-size:11px;color:#aaa;margin-top:8px">${e.message||''}</div>
      </div>`;
  }
  btn.disabled = false;
  document.getElementById("searchInput").value = "";
}

function renderSearchResult(d, msg){
  document.getElementById('searchResult').innerHTML = `
    <div class="result-card">
      <div class="card-top">
        <div>
          <div class="idiom-big">${d.idiom}</div>
          <div class="badge-row"><span class="badge badge-en">EN</span><span class="badge badge-ko">KO</span></div>
        </div>
        <button class="btn btn-gold btn-sm" onclick="handleAdd()">+ 숙어장</button>
      </div>
      <div class="divider"></div>
      <div class="meaning-block">
        <div class="meaning-row"><span class="meaning-flag">🇺🇸</span><span class="meaning-text">${d.meaning_en}</span></div>
        <div class="meaning-row"><span class="meaning-flag">🇰🇷</span><span class="meaning-text ko">${d.meaning_ko}</span></div>
      </div>
      <div class="example-block">
        <div class="block-label">💬 예문</div>
        <div class="example-text">"${d.example}"</div>
      </div>
      ${d.tip?`<div class="tip-block"><div class="block-label">💡 TIP</div><div class="tip-text">${d.tip}</div></div>`:''}
      ${msg?`<div class="${msg.startsWith('✅')?'msg-ok':'msg-warn'}">${msg}</div>`:''}
    </div>`;
}

function handleAdd(){
  if(!lastResult) return;
  const ok = addVocab(lastResult);
  renderSearchResult(lastResult, ok ? '✅ 숙어장에 추가 · GitHub에 저장 중…' : '⚠️ 이미 숙어장에 있습니다.');
}

// ── Vocab Render ───────────────────────────────────────────────────────────
function renderVocab(){
  document.getElementById('vocabCount').textContent = vocab.length + '개 저장됨';
  const el = document.getElementById('vocabList');
  if(vocab.length===0){
    el.innerHTML = `<div class="empty-state"><div class="empty-ico">📭</div><div class="empty-text">아직 저장된 숙어가 없어요.<br>검색 탭에서 추가해보세요!</div></div>`;
    return;
  }
  el.innerHTML = vocab.map((item,i)=>`
    <div class="vocab-item" id="vi-${i}">
      <div class="vocab-header" onclick="toggleVocab(${i})">
        <div class="vocab-num">${i+1}</div>
        <div class="vocab-main">
          <div class="vocab-idiom">${item.idiom}</div>
          <div class="vocab-preview">${item.meaning_ko}</div>
        </div>
        <span class="vocab-chevron">▼</span>
        <button class="vocab-del" onclick="event.stopPropagation();confirmDel('${item.idiom.replace(/'/g,"\\'")}')">✕</button>
      </div>
      <div class="vocab-body">
        <div class="meaning-row"><span class="meaning-flag">🇺🇸</span><span class="meaning-text">${item.meaning_en}</span></div>
        <div class="meaning-row"><span class="meaning-flag">🇰🇷</span><span class="meaning-text ko">${item.meaning_ko}</span></div>
        <div class="example-block"><div class="block-label">💬 예문</div><div class="example-text">"${item.example}"</div></div>
      </div>
    </div>`).join('');
}

function toggleVocab(i){ document.getElementById('vi-'+i).classList.toggle('open'); }
function confirmDel(idiom){ if(confirm(`"${idiom}"\n숙어장에서 삭제할까요?`)) removeVocab(idiom); }

// ── Game ───────────────────────────────────────────────────────────────────
let gameQ=[], gameIdx=0, gameScore=0, gameResults=[], gameSelected=null;

function renderGameIdle(){
  const enough = vocab.length >= 4;
  document.getElementById('gameArea').innerHTML = `
    <div class="game-idle">
      <div class="game-hero-ico">🎮</div>
      <div class="game-hero-title">숙어 퀴즈</div>
      ${!enough
        ? `<div class="game-hint">숙어장에 4개 이상 저장하면<br>게임을 시작할 수 있어요!</div>`
        : `<div class="game-hint">숙어장을 기반으로 4지선다 퀴즈!</div>
           <div class="game-modes">
             <button class="game-mode-btn" onclick="startVocabGame()">
               <span class="mode-ico">📚</span>
               <div class="mode-info"><div class="mode-name">내 숙어장 퀴즈</div><div class="mode-desc">저장된 숙어로 빠르게 시작</div></div>
             </button>
             <button class="game-mode-btn" onclick="startAIGame()">
               <span class="mode-ico">🤖</span>
               <div class="mode-info"><div class="mode-name">AI 변형 퀴즈</div><div class="mode-desc">Claude가 오답 보기까지 생성</div></div>
             </button>
           </div>`
      }
    </div>`;
}

function startVocabGame(){
  const pool = [...vocab].sort(()=>Math.random()-.5).slice(0,5);
  gameQ = pool.map(item=>{
    const dist = vocab.filter(x=>x.idiom!==item.idiom).sort(()=>Math.random()-.5).slice(0,3).map(x=>x.meaning_ko);
    const choices = [item.meaning_ko,...dist].sort(()=>Math.random()-.5);
    return {idiom:item.idiom, meaning_ko:item.meaning_ko, choices, answer:item.meaning_ko};
  });
  startGame();
}

async function startAIGame(){
  document.getElementById('gameArea').innerHTML = `<div class="loader-wrap"><div class="spinner"></div><p>AI가 퀴즈를 생성 중…</p></div>`;
  try {
    const sample = [...vocab].sort(()=>Math.random()-.5).slice(0,5).map(x=>x.idiom).join(', ');
    const sys = `You are an English idiom quiz generator. Return ONLY a valid JSON array of 5 objects. Each object: {"idiom":"...","meaning_ko":"...","choices":["A_Korean","B_Korean","C_Korean","D_Korean"],"answer":"exact_correct_choice"} choices must be Korean meanings; one correct, three plausible distractors. No markdown.`;
    const qs = await callClaude(`Generate quiz for: ${sample}`, sys);
    gameQ = Array.isArray(qs) ? qs : [];
    startGame();
  } catch(e){ renderGameIdle(); }
}

function startGame(){ gameIdx=0; gameScore=0; gameResults=[]; gameSelected=null; renderQuestion(); }

function renderQuestion(){
  const q = gameQ[gameIdx];
  const letters = ['A','B','C','D'];
  document.getElementById('gameArea').innerHTML = `
    <div class="q-progress-wrap">
      <div class="q-progress-bg"><div class="q-progress-fill" style="width:${(gameIdx/gameQ.length)*100}%"></div></div>
      <div class="q-meta"><span>${gameIdx+1} / ${gameQ.length}</span><span class="q-score-live">점수: ${gameScore}</span></div>
    </div>
    <div class="q-card">
      <div class="q-idiom-text">${q.idiom}</div>
      <div class="q-ask">이 숙어의 한국어 뜻은?</div>
    </div>
    <div class="choices">
      ${q.choices.map((c,i)=>`
        <button class="choice-btn" id="ch-${i}" onclick="chooseAnswer(${i})">
          <span class="choice-letter">${letters[i]}</span>${c}
        </button>`).join('')}
    </div>
    <div class="next-wrap" id="nextWrap" style="display:none">
      <button class="btn btn-primary btn-full" onclick="nextQuestion()">${gameIdx+1>=gameQ.length?'결과 보기 →':'다음 문제 →'}</button>
    </div>`;
}

function chooseAnswer(i){
  if(gameSelected!==null) return;
  gameSelected=i;
  const q=gameQ[gameIdx];
  const correct=q.choices[i]===q.answer;
  if(correct) gameScore++;
  gameResults.push({idiom:q.idiom,correct,chosen:q.choices[i],answer:q.answer});
  q.choices.forEach((_,idx)=>{
    const btn=document.getElementById('ch-'+idx);
    btn.disabled=true;
    if(q.choices[idx]===q.answer) btn.classList.add('correct');
    else if(idx===i) btn.classList.add('wrong');
  });
  document.getElementById('nextWrap').style.display='block';
}

function nextQuestion(){
  gameSelected=null; gameIdx++;
  if(gameIdx>=gameQ.length){ renderDone(); return; }
  renderQuestion();
}

function renderDone(){
  const pct=Math.round((gameScore/gameQ.length)*100);
  const grade=pct>=80?'🏆 훌륭해요!':pct>=60?'👍 잘했어요!':'📖 더 연습해봐요!';
  document.getElementById('gameArea').innerHTML = `
    <div class="done-screen">
      <div class="score-ring"><div class="score-big">${gameScore}</div><div class="score-of">/ ${gameQ.length}</div></div>
      <div class="score-grade">${grade}</div>
      <div class="review-list">
        ${gameResults.map(r=>`
          <div class="review-row ${r.correct?'ok':'fail'}">
            <span>${r.correct?'✅':'❌'}</span>
            <span class="review-idiom">${r.idiom}</span>
            ${!r.correct?`<span class="review-ans">→ ${r.answer}</span>`:''}
          </div>`).join('')}
      </div>
      <button class="btn btn-primary btn-full" onclick="renderGameIdle()">다시 하기</button>
    </div>`;
}

// ── Init ───────────────────────────────────────────────────────────────────
// Service Worker 제거 (이전 캐시 정리)
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>regs.forEach(r=>r.unregister()));
}

renderGameIdle();
loadFromGitHub(); // GitHub에서 숙어장 불러오기

// API 키 없으면 설정 안내
if(!apiKey){ setTimeout(()=>{ showSettingsModal(); }, 600); }
</script>
