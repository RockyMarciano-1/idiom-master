<script>
// ── Storage ────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'idiom-master-v2';
let vocab = [];
try { vocab = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e){}

function saveVocab(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(vocab)); }

function addVocab(entry){
  if(vocab.find(x=>x.idiom.toLowerCase()===entry.idiom.toLowerCase())) return false;
  vocab.unshift(entry); saveVocab(); renderVocab(); return true;
}

function removeVocab(idiom){
  vocab = vocab.filter(x=>x.idiom!==idiom); saveVocab(); renderVocab();
}

// ── Tabs ───────────────────────────────────────────────────────────────────
function switchTab(n){
  document.querySelectorAll('.tab-page').forEach((p,i)=>p.classList.toggle('active',i===n));
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===n));
  if(n===1) renderVocab();
  if(n===2) renderGameIdle();
}

// ── API Key Management ─────────────────────────────────────────────────────
const API_KEY_STORAGE = 'idiom-master-apikey';
let apiKey = localStorage.getItem(API_KEY_STORAGE) || '';

function getApiKey(){ return apiKey; }

function saveApiKey(key){
  apiKey = key.trim();
  localStorage.setItem(API_KEY_STORAGE, apiKey);
}

function clearApiKey(){
  apiKey = '';
  localStorage.removeItem(API_KEY_STORAGE);
}

function showApiKeyModal(onSuccess){
  const overlay = document.createElement('div');
  overlay.id = 'apiModal';
  overlay.style.cssText = `
    position:fixed;inset:0;background:rgba(0,0,0,.7);
    display:flex;align-items:center;justify-content:center;
    z-index:9999;padding:24px;backdrop-filter:blur(4px);
  `;
  overlay.innerHTML = `
    <div style="background:white;border-radius:20px;padding:28px 24px;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)">
      <div style="font-size:36px;text-align:center;margin-bottom:8px">🔑</div>
      <h2 style="font-family:'Playfair Display',serif;font-size:20px;text-align:center;color:#1a1a2e;margin-bottom:8px">API 키 설정</h2>
      <p style="font-size:12px;color:#7a7068;text-align:center;line-height:1.6;margin-bottom:16px">
        Anthropic API 키를 입력하세요.<br>키는 이 기기에만 저장되며 외부로 전송되지 않습니다.
      </p>
      <div style="background:#faf8f3;border-radius:12px;padding:12px;margin-bottom:14px;font-size:11px;color:#7a7068;line-height:1.7">
        📌 API 키 발급: <a href="https://console.anthropic.com/api-keys" target="_blank" style="color:#c0392b">console.anthropic.com</a><br>
        에서 무료 가입 후 발급받을 수 있습니다.
      </div>
      <input id="apiKeyInput" type="password"
        placeholder="sk-ant-api03-..."
        style="width:100%;border:2px solid #ddd6c8;border-radius:12px;padding:13px 16px;font-size:13px;font-family:monospace;outline:none;margin-bottom:10px;box-sizing:border-box"
        value="${apiKey}"
      />
      <div id="apiKeyErr" style="color:#c0392b;font-size:12px;margin-bottom:10px;display:none;text-align:center"></div>
      <button onclick="handleApiKeySave()" style="width:100%;background:#c0392b;color:white;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif">
        저장하고 시작하기
      </button>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('apiKeyInput').focus();
  window._apiKeyCallback = onSuccess;
}

async function handleApiKeySave(){
  const val = document.getElementById('apiKeyInput').value.trim();
  const errEl = document.getElementById('apiKeyErr');
  if(!val.startsWith('sk-ant-')){
    errEl.textContent = '올바른 API 키 형식이 아닙니다 (sk-ant-로 시작)';
    errEl.style.display='block'; return;
  }
  errEl.style.display='none';
  saveApiKey(val);
  document.getElementById('apiModal').remove();
  if(window._apiKeyCallback) window._apiKeyCallback();
}

// ── Claude API ─────────────────────────────────────────────────────────────
async function callClaude(userMsg, sys){
  if(!getApiKey()){
    return new Promise(resolve => showApiKeyModal(async()=>{
      resolve(await callClaude(userMsg, sys));
    }));
  }
  const controller = new AbortController();
  const timeout = setTimeout(()=>controller.abort(), 30000);
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': getApiKey(),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      signal: controller.signal,
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        system: sys || 'Return ONLY valid JSON, no markdown fences.',
        messages:[{role:'user',content:userMsg}]
      })
    });
    if(res.status===401){
      clearApiKey();
      throw new Error('API 키가 만료되었거나 유효하지 않습니다. 다시 설정해주세요.');
    }
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    const raw = (data.content?.[0]?.text || '{}').replace(/```json|```/g,'').trim();
    return JSON.parse(raw);
  } finally {
    clearTimeout(timeout);
  }
}

// ── Search ─────────────────────────────────────────────────────────────────
let lastResult = null;
let searchMsg = '';

async function doSearch(){
  const q = document.getElementById('searchInput').value.trim();
  if(!q) return;
  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  document.getElementById('searchResult').innerHTML = `
    <div class="loader-wrap">
      <div class="spinner"></div>
      <p>Claude가 분석 중…</p>
    </div>`;

  try {
    const sys = `You are an English idiom expert. Return ONLY valid JSON with keys:
idiom, meaning_en, meaning_ko, example, tip.
No markdown fences, no extra text.`;
    const data = await callClaude(`Look up this English idiom: "${q}"`, sys);
    lastResult = data;
    renderSearchResult(data, '');
  } catch(e){
    const isOffline = !navigator.onLine;
    document.getElementById('searchResult').innerHTML = `
      <div class="empty-state">
        <div class="empty-ico">${isOffline?'📡':'❌'}</div>
        <div class="empty-text">${isOffline
          ? '인터넷 연결을 확인해주세요.'
          : '검색에 실패했습니다.<br>⚙️ 버튼을 눌러 API 키를 다시 확인해주세요.'}</div>
        <div style="font-size:11px;color:#aaa;margin-top:8px;word-break:break-all">${e.message||''}</div>
      </div>`;
  }
  btn.disabled = false;
}

function renderSearchResult(d, msg){
  document.getElementById('searchResult').innerHTML = `
    <div class="result-card">
      <div class="card-top">
        <div>
          <div class="idiom-big">${d.idiom}</div>
          <div class="badge-row">
            <span class="badge badge-en">EN</span>
            <span class="badge badge-ko">KO</span>
          </div>
        </div>
        <button class="btn btn-gold btn-sm" onclick="handleAdd()">+ 숙어장</button>
      </div>
      <div class="divider"></div>
      <div class="meaning-block">
        <div class="meaning-row">
          <span class="meaning-flag">🇺🇸</span>
          <span class="meaning-text">${d.meaning_en}</span>
        </div>
        <div class="meaning-row">
          <span class="meaning-flag">🇰🇷</span>
          <span class="meaning-text ko">${d.meaning_ko}</span>
        </div>
      </div>
      <div class="example-block">
        <div class="block-label">💬 예문</div>
        <div class="example-text">"${d.example}"</div>
      </div>
      ${d.tip ? `<div class="tip-block">
        <div class="block-label">💡 TIP</div>
        <div class="tip-text">${d.tip}</div>
      </div>` : ''}
      ${msg ? `<div class="${msg.startsWith('✅')?'msg-ok':'msg-warn'}">${msg}</div>` : ''}
    </div>`;
}

function handleAdd(){
  if(!lastResult) return;
  const ok = addVocab(lastResult);
  renderSearchResult(lastResult, ok ? '✅ 숙어장에 추가되었습니다!' : '⚠️ 이미 숙어장에 있습니다.');
}

// ── Vocab ──────────────────────────────────────────────────────────────────
function renderVocab(){
  document.getElementById('vocabCount').textContent = vocab.length + '개 저장됨';
  const el = document.getElementById('vocabList');
  if(vocab.length===0){
    el.innerHTML = `<div class="empty-state">
      <div class="empty-ico">📭</div>
      <div class="empty-text">아직 저장된 숙어가 없어요.<br>검색 탭에서 추가해보세요!</div>
    </div>`; return;
  }
  el.innerHTML = vocab.map((item,i)=>`
    <div class="vocab-item" id="vi-${i}">
      <div class="vocab-header" onclick="toggleVocab(${i})">
        <div class="vocab-num">${i+1}</div>
        <div class="vocab-main">
          <div class="vocab-idiom">${item.idiom}</div>
          <div class="vocab-preview">${item.meaning_ko}</div>
        </div>
        <span class="vocab-chevron">▼</span>
        <button class="vocab-del" onclick="event.stopPropagation();confirmDel('${item.idiom.replace(/'/g,"\\'")}')">✕</button>
      </div>
      <div class="vocab-body">
        <div class="meaning-row">
          <span class="meaning-flag">🇺🇸</span>
          <span class="meaning-text">${item.meaning_en}</span>
        </div>
        <div class="meaning-row">
          <span class="meaning-flag">🇰🇷</span>
          <span class="meaning-text ko">${item.meaning_ko}</span>
        </div>
        <div class="example-block">
          <div class="block-label">💬 예문</div>
          <div class="example-text">"${item.example}"</div>
        </div>
      </div>
    </div>`).join('');
}

function toggleVocab(i){
  const el = document.getElementById('vi-'+i);
  el.classList.toggle('open');
}

function confirmDel(idiom){
  if(confirm(`"${idiom}"\n숙어장에서 삭제할까요?`)) removeVocab(idiom);
}

// ── Game ───────────────────────────────────────────────────────────────────
let gameQ = [], gameIdx = 0, gameScore = 0, gameResults = [], gameSelected = null;

function renderGameIdle(){
  const enough = vocab.length >= 4;
  document.getElementById('gameArea').innerHTML = `
    <div class="game-idle">
      <div class="game-hero-ico">🎮</div>
      <div class="game-hero-title">숙어 퀴즈</div>
      ${!enough
        ? `<div class="game-hint">숙어장에 4개 이상 저장하면<br>게임을 시작할 수 있어요!</div>`
        : `<div class="game-hint">숙어장을 기반으로 4지선다 퀴즈!</div>
           <div class="game-modes">
             <button class="game-mode-btn" onclick="startVocabGame()">
               <span class="mode-ico">📚</span>
               <div class="mode-info">
                 <div class="mode-name">내 숙어장 퀴즈</div>
                 <div class="mode-desc">저장된 숙어로 빠르게 시작</div>
               </div>
             </button>
             <button class="game-mode-btn" onclick="startAIGame()">
               <span class="mode-ico">🤖</span>
               <div class="mode-info">
                 <div class="mode-name">AI 변형 퀴즈</div>
                 <div class="mode-desc">Claude가 오답 보기까지 생성</div>
               </div>
             </button>
           </div>`
      }
    </div>`;
}

function startVocabGame(){
  const pool = [...vocab].sort(()=>Math.random()-.5).slice(0,5);
  gameQ = pool.map(item=>{
    const dist = vocab
      .filter(x=>x.idiom!==item.idiom)
      .sort(()=>Math.random()-.5).slice(0,3)
      .map(x=>x.meaning_ko);
    const choices = [item.meaning_ko,...dist].sort(()=>Math.random()-.5);
    return {idiom:item.idiom, meaning_ko:item.meaning_ko, choices, answer:item.meaning_ko};
  });
  startGame();
}

async function startAIGame(){
  document.getElementById('gameArea').innerHTML = `
    <div class="loader-wrap">
      <div class="spinner"></div>
      <p>AI가 퀴즈를 생성 중…</p>
    </div>`;
  try {
    const sample = [...vocab].sort(()=>Math.random()-.5).slice(0,5).map(x=>x.idiom).join(', ');
    const sys = `You are an English idiom quiz generator. Return ONLY a valid JSON array of 5 objects.
Each object: {"idiom":"...","meaning_ko":"...","choices":["A_Korean","B_Korean","C_Korean","D_Korean"],"answer":"exact_correct_choice"}
choices must be Korean meanings; one correct, three plausible distractors. No markdown.`;
    const qs = await callClaude(`Generate quiz for: ${sample}`, sys);
    gameQ = Array.isArray(qs) ? qs : [];
    startGame();
  } catch(e){
    renderGameIdle();
  }
}

function startGame(){
  gameIdx=0; gameScore=0; gameResults=[]; gameSelected=null;
  renderQuestion();
}

function renderQuestion(){
  const q = gameQ[gameIdx];
  const letters = ['A','B','C','D'];
  document.getElementById('gameArea').innerHTML = `
    <div class="q-progress-wrap">
      <div class="q-progress-bg">
        <div class="q-progress-fill" style="width:${((gameIdx)/gameQ.length)*100}%"></div>
      </div>
      <div class="q-meta">
        <span>${gameIdx+1} / ${gameQ.length}</span>
        <span class="q-score-live">점수: ${gameScore}</span>
      </div>
    </div>
    <div class="q-card">
      <div class="q-idiom-text">${q.idiom}</div>
      <div class="q-ask">이 숙어의 한국어 뜻은?</div>
    </div>
    <div class="choices">
      ${q.choices.map((c,i)=>`
        <button class="choice-btn" id="ch-${i}" onclick="chooseAnswer(${i})">
          <span class="choice-letter">${letters[i]}</span>${c}
        </button>`).join('')}
    </div>
    <div class="next-wrap" id="nextWrap" style="display:none">
      <button class="btn btn-primary btn-full" onclick="nextQuestion()">
        ${gameIdx+1>=gameQ.length ? '결과 보기 →' : '다음 문제 →'}
      </button>
    </div>`;
}

function chooseAnswer(i){
  if(gameSelected!==null) return;
  gameSelected = i;
  const q = gameQ[gameIdx];
  const correct = q.choices[i]===q.answer;
  if(correct) gameScore++;
  gameResults.push({idiom:q.idiom, correct, chosen:q.choices[i], answer:q.answer});

  q.choices.forEach((_,idx)=>{
    const btn = document.getElementById('ch-'+idx);
    btn.disabled = true;
    if(q.choices[idx]===q.answer) btn.classList.add('correct');
    else if(idx===i) btn.classList.add('wrong');
  });
  document.getElementById('nextWrap').style.display='block';
}

function nextQuestion(){
  gameSelected=null;
  gameIdx++;
  if(gameIdx>=gameQ.length){ renderDone(); return; }
  renderQuestion();
}

function renderDone(){
  const pct = Math.round((gameScore/gameQ.length)*100);
  const grade = pct>=80?'🏆 훌륭해요!':pct>=60?'👍 잘했어요!':'📖 더 연습해봐요!';
  document.getElementById('gameArea').innerHTML = `
    <div class="done-screen">
      <div class="score-ring">
        <div class="score-big">${gameScore}</div>
        <div class="score-of">/ ${gameQ.length}</div>
      </div>
      <div class="score-grade">${grade}</div>
      <div class="review-list">
        ${gameResults.map(r=>`
          <div class="review-row ${r.correct?'ok':'fail'}">
            <span>${r.correct?'✅':'❌'}</span>
            <span class="review-idiom">${r.idiom}</span>
            ${!r.correct?`<span class="review-ans">→ ${r.answer}</span>`:''}
          </div>`).join('')}
      </div>
      <button class="btn btn-primary btn-full" onclick="renderGameIdle()">다시 하기</button>
    </div>`;
}

// ── Service Worker 없음 (PWA standalone에서 API 차단 방지) ──────────────────
// 혹시 이전에 등록된 SW가 있으면 즉시 제거
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>{
    regs.forEach(r=>r.unregister());
  });
}

// ── Init ───────────────────────────────────────────────────────────────────
renderVocab();
renderGameIdle();
// API 키 없으면 첫 실행 시 자동으로 설정 모달 표시
if(!getApiKey()){
  setTimeout(()=>showApiKeyModal(()=>{}), 400);
}
</script>
